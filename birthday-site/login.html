<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atshaya | Birthday Login</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="login-page">
    <div class="background-orbit"></div>
    <div class="background-orbit background-orbit--secondary"></div>
    <div class="starfield" id="loginStarfield"></div>

    <main class="login-shell">
      <section class="login-card glass-panel">
        <header class="login-header">
          <p class="eyebrow">Welcome to</p>
          <h1 class="login-title">Atshaya&rsquo;s Birthday Universe</h1>
          <p class="login-subtitle">
            A cinematic journey prepared just for you.
          </p>
        </header>

        <form id="loginForm" class="login-form" autocomplete="off">
          <div class="input-group">
            <label for="loginId">ID</label>
            <input
              type="text"
              id="loginId"
              name="loginId"
              placeholder="Enter your special ID"
              required
            />
          </div>

          <div class="input-group">
            <label for="loginPassword">Password</label>
            <input
              type="password"
              id="loginPassword"
              name="loginPassword"
              placeholder="Enter your secret key"
              required
            />
          </div>

          <button type="submit" class="btn primary-btn full-width">
            Enter the Universe
          </button>

          <p class="login-hint">
            This is a private universe. Use the secret keys you received.
          </p>

          <p id="loginError" class="login-error" aria-live="polite"></p>
        </form>

        <footer class="login-footer">
          <span class="dot"></span>
          <p>Crafted with stardust and love.</p>
        </footer>
      </section>
    </main>

    <script src="script.js" defer></script>
  </body>
  </html>
